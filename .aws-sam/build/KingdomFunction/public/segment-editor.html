<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Éditeur de Segments</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #fff; font-family: monospace; display: flex; height: 100vh; overflow: hidden; }
    #canvas-wrap { flex: 1; overflow: hidden; position: relative; }
    canvas { display: block; cursor: crosshair; }
    #controls {
      width: 220px; background: #1a1a1a; padding: 12px; overflow-y: auto;
      border-left: 1px solid #333; font-size: 13px; display: flex; flex-direction: column; gap: 10px;
    }
    h2 { color: #c8a84b; font-size: 14px; }
    .section-title { color: #888; font-size: 11px; text-transform: uppercase; margin-bottom: 4px; }

    .seg-btn {
      width: 100%; padding: 8px 10px; border: 2px solid #333; border-radius: 5px;
      cursor: pointer; font-family: monospace; font-size: 12px; font-weight: bold;
      display: flex; align-items: center; gap: 8px; background: #0a0a0a; color: #ccc;
      transition: border-color 0.1s;
    }
    .seg-btn:hover { border-color: #666; }
    .seg-btn.active { border-color: #fff; color: #fff; }
    .seg-swatch {
      width: 32px; height: 6px; border-radius: 3px; flex-shrink: 0;
    }

    button.action {
      width: 100%; padding: 8px; background: #1a3a5a; color: #4ab0ea;
      border: 1px solid #2a6a9a; cursor: pointer; border-radius: 4px; font-family: monospace; font-size: 12px;
    }
    button.action:hover { background: #2a4a7a; }
    button.action.danger { background: #3a1a1a; color: #ea6060; border-color: #6a2a2a; }
    button.action.success { background: #1a3a1a; color: #60ea60; border-color: #2a6a2a; }

    #coords { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.75);
      padding: 4px 8px; font-family: monospace; font-size: 12px; color: #c8a84b; pointer-events: none; }

    label { color: #aaa; display: block; margin-bottom: 2px; }
    input[type=range] { width: 100%; }
    .val { color: #c8a84b; font-weight: bold; }
    #status { font-size: 11px; color: #60ea60; min-height: 16px; }

    .count-table { font-size: 11px; color: #888; }
    .count-table td:last-child { color: #c8a84b; text-align: right; padding-left: 8px; }
  </style>
</head>
<body>
<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="coords">q: — r: —</div>
</div>

<div id="controls">
  <h2>⚔ Éditeur de Segments</h2>

  <div>
    <div class="section-title">Segment actif</div>
    <div style="display:flex;flex-direction:column;gap:5px;">
      <button class="seg-btn active" data-seg="river">
        <span class="seg-swatch" style="background:#4a90d9;"></span> Rivière
      </button>
      <button class="seg-btn" data-seg="cliff">
        <span class="seg-swatch" style="background:#8888aa;"></span> Falaise
      </button>
      <button class="seg-btn" data-seg="bridge">
        <span class="seg-swatch" style="background:#e8a040;"></span> Pont
      </button>
      <button class="seg-btn" data-seg="passerelle">
        <span class="seg-swatch" style="background:#c8b060;"></span> Passerelle
      </button>
      <button class="seg-btn" data-seg="barriere">
        <span class="seg-swatch" style="background:#4a8040;"></span> Barrière
      </button>
      <button class="seg-btn" data-seg="chevaux_de_frise">
        <span class="seg-swatch" style="background:#c04040;"></span> Chvx de frise
      </button>
      <button class="seg-btn" data-seg="mur">
        <span class="seg-swatch" style="background:#606060;"></span> Mur
      </button>
      <button class="seg-btn" data-seg="echelle">
        <span class="seg-swatch" style="background:#a07840;"></span> Échelle
      </button>
      <button class="seg-btn" id="btn-erase">
        <span class="seg-swatch" style="background:#333;border:1px dashed #666;"></span> Effacer
      </button>
    </div>
  </div>

  <div>
    <label>Zoom: <span class="val" id="v-zoom">1.0</span></label>
    <input type="range" id="zoom-slider" min="0.02" max="0.5" value="0.1" step="0.005">
  </div>

  <div>
    <label>Épaisseur lignes: <span class="val" id="v-lw">4</span></label>
    <input type="range" id="lw-slider" min="1" max="12" value="4" step="1">
  </div>

  <div>
    <label>Opacité grille: <span class="val" id="v-grid">0.3</span></label>
    <input type="range" id="grid-slider" min="0" max="1" value="0.3" step="0.05">
  </div>

  <div>
    <button class="action success" onclick="saveData()">💾 Sauvegarder JSON</button>
    <button class="action" onclick="loadFile()" style="margin-top:4px;">📂 Charger JSON</button>
    <input type="file" id="file-input" accept=".json" style="display:none" onchange="onFileLoad(event)">
    <button class="action danger" onclick="clearAll()" style="margin-top:4px;">🗑 Tout effacer</button>
  </div>

  <div id="status"></div>

  <div>
    <div class="section-title">Statistiques</div>
    <table class="count-table" id="count-table"></table>
  </div>

  <div style="font-size:10px;color:#555;margin-top:4px;">
    <b>Navigation:</b><br>
    • Clic gauche = peindre bord<br>
    • Clic-glisser = peindre en continu<br>
    • Clic molette/droit = déplacer<br>
    • Molette = zoom
  </div>
</div>

<script>
// Calibration (synchronisée avec le jeu)
const MAP_HEX_SIZE = 101.5;
const MAP_ORIG_X   = 137;
const MAP_ORIG_Y   = 190;
const MAP_IMG_W    = 8800;
const MAP_IMG_H    = 7200;

// Direction i → neighbor offset AND edge (corners[i] to corners[(i+1)%6])
// Verified for flat-top hex in this coordinate system:
// edge 0 = corners[0→1] → lower-right neighbor (+1, 0)
// edge 1 = corners[1→2] → down neighbor (0, +1)
// edge 2 = corners[2→3] → lower-left neighbor (-1, +1)
// edge 3 = corners[3→4] → upper-left neighbor (-1, 0)
// edge 4 = corners[4→5] → up neighbor (0, -1)
// edge 5 = corners[5→0] → upper-right neighbor (+1, -1)
const DIRS = [[1,0],[0,1],[-1,1],[-1,0],[0,-1],[1,-1]];

const SEGMENT_COLORS = {
  river:           '#4a90d9',
  cliff:           '#8888aa',
  bridge:          '#e8a040',
  passerelle:      '#c8b060',
  barriere:        '#4a8040',
  chevaux_de_frise:'#c04040',
  mur:             '#606060',
  echelle:         '#a07840',
};

const SEGMENT_LABELS = {
  river:'Rivière', cliff:'Falaise', bridge:'Pont', passerelle:'Passerelle',
  barriere:'Barrière', chevaux_de_frise:'Chvx de frise', mur:'Mur', echelle:'Échelle',
};

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('canvas-wrap');

const img = new Image();
img.src = '/img/map.webp';
img.onload = () => draw();

// State
let zoom = 0.1, panX = 0, panY = 0;
let lineWidth = 4, gridAlpha = 0.3;
let currentSeg = 'river';
let segmentMap = {}; // canonical key → segment type
let painting = false;
let dragging = false, lastMx = 0, lastMy = 0;
let hoverKey = null, hoverEdge = null;

// ---- HEX MATH ----
function hexToPixel(q, r) {
  const x = MAP_HEX_SIZE * (3/2 * q) + MAP_ORIG_X;
  const y = MAP_HEX_SIZE * (Math.sqrt(3)/2 * q + Math.sqrt(3) * r) + MAP_ORIG_Y;
  return { x, y };
}
function pixelToHex(px, py) {
  const x = (px - MAP_ORIG_X) / MAP_HEX_SIZE;
  const y = (py - MAP_ORIG_Y) / MAP_HEX_SIZE;
  const q = (2/3) * x;
  const r = (-1/3) * x + (Math.sqrt(3)/3) * y;
  return roundHex(q, r);
}
function roundHex(q, r) {
  const s = -q - r;
  let rq = Math.round(q), rr = Math.round(r), rs = Math.round(s);
  const dq = Math.abs(rq-q), dr = Math.abs(rr-r), ds = Math.abs(rs-s);
  if (dq > dr && dq > ds) rq = -rr-rs;
  else if (dr > ds) rr = -rq-rs;
  return { q: rq, r: rr };
}
function hexCorners(cx, cy) {
  const corners = [];
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 180 * (60 * i);
    corners.push({ x: cx + MAP_HEX_SIZE * Math.cos(angle), y: cy + MAP_HEX_SIZE * Math.sin(angle) });
  }
  return corners;
}

function edgeKey(q1, r1, q2, r2) {
  if (q1 < q2 || (q1 === q2 && r1 < r2)) return `${q1},${r1}|${q2},${r2}`;
  return `${q2},${r2}|${q1},${r1}`;
}

function findNearestEdge(imgX, imgY) {
  const { q: cq, r: cr } = pixelToHex(imgX, imgY);
  let bestDistSq = Infinity, bestKey = null, bestC1 = null, bestC2 = null;

  // Check center hex and all 6 neighbors (covers all visible edges)
  const candidates = [[cq, cr]];
  for (const [dq, dr] of DIRS) candidates.push([cq + dq, cr + dr]);

  for (const [q, r] of candidates) {
    const { x: cx, y: cy } = hexToPixel(q, r);
    const corners = hexCorners(cx, cy);
    for (let i = 0; i < 6; i++) {
      const c1 = corners[i], c2 = corners[(i + 1) % 6];
      const mx = (c1.x + c2.x) / 2, my = (c1.y + c2.y) / 2;
      const distSq = (mx - imgX) ** 2 + (my - imgY) ** 2;
      if (distSq < bestDistSq) {
        const [nq, nr] = [q + DIRS[i][0], r + DIRS[i][1]];
        bestDistSq = distSq;
        bestKey = edgeKey(q, r, nq, nr);
        bestC1 = c1; bestC2 = c2;
      }
    }
  }
  return { key: bestKey, c1: bestC1, c2: bestC2 };
}

// ---- DRAW ----
function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  if (!img.complete || !img.naturalWidth) return;

  ctx.save();
  ctx.translate(panX, panY);
  ctx.scale(zoom, zoom);

  ctx.drawImage(img, 0, 0);

  // Grid
  if (gridAlpha > 0) {
    ctx.strokeStyle = `rgba(200,180,100,${gridAlpha})`;
    ctx.lineWidth = 1;
    const W2 = canvas.width, H2 = canvas.height;
    const S = Math.sqrt(3);
    const tl = { x: -panX / zoom, y: -panY / zoom };
    const br = { x: (W2 - panX) / zoom, y: (H2 - panY) / zoom };
    const vqMin = Math.floor((tl.x - MAP_ORIG_X - MAP_HEX_SIZE) / (MAP_HEX_SIZE * 1.5)) - 1;
    const vqMax = Math.ceil((br.x - MAP_ORIG_X + MAP_HEX_SIZE) / (MAP_HEX_SIZE * 1.5)) + 1;
    const vrMin = Math.floor((tl.y - MAP_ORIG_Y - MAP_HEX_SIZE) / (MAP_HEX_SIZE * S)) - 2;
    const vrMax = Math.ceil((br.y - MAP_ORIG_Y + MAP_HEX_SIZE) / (MAP_HEX_SIZE * S)) + 2;
    for (let q = vqMin; q <= vqMax; q++) {
      for (let r = vrMin; r <= vrMax; r++) {
        const { x, y } = hexToPixel(q, r);
        const corners = hexCorners(x, y);
        ctx.beginPath();
        ctx.moveTo(corners[0].x, corners[0].y);
        for (let i = 1; i < 6; i++) ctx.lineTo(corners[i].x, corners[i].y);
        ctx.closePath();
        ctx.stroke();
      }
    }
  }

  // Segments
  ctx.lineCap = 'round';
  for (const [key, segType] of Object.entries(segmentMap)) {
    const [part1, part2] = key.split('|');
    const [q1, r1] = part1.split(',').map(Number);
    const [q2, r2] = part2.split(',').map(Number);
    const dq = q2 - q1, dr = r2 - r1;
    const dirIdx = DIRS.findIndex(([d0, d1]) => d0 === dq && d1 === dr);
    if (dirIdx === -1) continue;

    const { x: cx, y: cy } = hexToPixel(q1, r1);
    const corners = hexCorners(cx, cy);
    const c1 = corners[dirIdx], c2 = corners[(dirIdx + 1) % 6];

    ctx.strokeStyle = SEGMENT_COLORS[segType] || '#fff';
    ctx.lineWidth = lineWidth;
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.moveTo(c1.x, c1.y);
    ctx.lineTo(c2.x, c2.y);
    ctx.stroke();
  }

  // Hover preview
  if (hoverEdge) {
    const color = currentSeg === '__erase__'
      ? 'rgba(255,80,80,0.8)'
      : (SEGMENT_COLORS[currentSeg] || '#fff');
    ctx.strokeStyle = color;
    ctx.lineWidth = lineWidth + 2;
    ctx.globalAlpha = 0.6;
    ctx.beginPath();
    ctx.moveTo(hoverEdge.c1.x, hoverEdge.c1.y);
    ctx.lineTo(hoverEdge.c2.x, hoverEdge.c2.y);
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// ---- PAINTING ----
function paintEdge(mx, my) {
  const imgX = (mx - panX) / zoom;
  const imgY = (my - panY) / zoom;
  const { key, c1, c2 } = findNearestEdge(imgX, imgY);
  if (!key) return;
  if (currentSeg === '__erase__') {
    delete segmentMap[key];
  } else {
    segmentMap[key] = currentSeg;
  }
  draw();
  updateCounts();
}

// ---- INPUT ----
canvas.addEventListener('mousedown', e => {
  if (e.button === 1 || e.button === 2) {
    dragging = true; lastMx = e.clientX; lastMy = e.clientY;
    return;
  }
  painting = true;
  paintEdge(e.clientX, e.clientY);
});
canvas.addEventListener('mousemove', e => {
  if (dragging) {
    panX += e.clientX - lastMx;
    panY += e.clientY - lastMy;
    lastMx = e.clientX; lastMy = e.clientY;
    draw(); return;
  }

  const imgX = (e.clientX - panX) / zoom;
  const imgY = (e.clientY - panY) / zoom;
  const { key, c1, c2 } = findNearestEdge(imgX, imgY);
  hoverKey = key;
  hoverEdge = (c1 && c2) ? { c1, c2 } : null;

  if (painting) paintEdge(e.clientX, e.clientY);
  else draw();

  // Coords
  const { q, r } = pixelToHex(imgX, imgY);
  const segInfo = key && segmentMap[key] ? ` | ${SEGMENT_LABELS[segmentMap[key]] || segmentMap[key]}` : '';
  document.getElementById('coords').textContent = `q: ${q}  r: ${r}${segInfo}  |  img: ${Math.round(imgX)}, ${Math.round(imgY)}`;
});
canvas.addEventListener('mouseup', () => { painting = false; dragging = false; });
canvas.addEventListener('mouseleave', () => {
  painting = false; dragging = false;
  hoverKey = null; hoverEdge = null;
  draw();
});
canvas.addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  panX = mx - (mx - panX) * factor;
  panY = my - (my - panY) * factor;
  zoom = Math.max(0.02, Math.min(2, zoom * factor));
  document.getElementById('zoom-slider').value = zoom;
  document.getElementById('v-zoom').textContent = zoom.toFixed(3);
  draw();
}, { passive: false });

// ---- CONTROLS ----
document.querySelectorAll('.seg-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.seg-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSeg = btn.id === 'btn-erase' ? '__erase__' : btn.dataset.seg;
  });
});

document.getElementById('zoom-slider').addEventListener('input', function() {
  zoom = parseFloat(this.value);
  document.getElementById('v-zoom').textContent = zoom.toFixed(3);
  draw();
});
document.getElementById('lw-slider').addEventListener('input', function() {
  lineWidth = parseInt(this.value);
  document.getElementById('v-lw').textContent = lineWidth;
  draw();
});
document.getElementById('grid-slider').addEventListener('input', function() {
  gridAlpha = parseFloat(this.value);
  document.getElementById('v-grid').textContent = gridAlpha.toFixed(2);
  draw();
});

// ---- SAVE / LOAD ----
function saveData() {
  const data = JSON.stringify(segmentMap, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'segments.json';
  a.click();
  setStatus('✓ Sauvegardé !');
}

function loadFile() {
  document.getElementById('file-input').click();
}
function onFileLoad(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      segmentMap = JSON.parse(ev.target.result);
      draw(); updateCounts();
      setStatus(`✓ Chargé : ${Object.keys(segmentMap).length} segments`);
    } catch(err) {
      setStatus('✗ Erreur de lecture JSON');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function clearAll() {
  if (!confirm('Effacer tous les segments ?')) return;
  segmentMap = {};
  draw(); updateCounts();
  setStatus('✓ Tout effacé');
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
  setTimeout(() => document.getElementById('status').textContent = '', 3000);
}

function updateCounts() {
  const counts = {};
  for (const t of Object.values(segmentMap)) {
    counts[t] = (counts[t] || 0) + 1;
  }
  const table = document.getElementById('count-table');
  table.innerHTML = Object.entries(counts)
    .map(([t, n]) => `<tr><td>${SEGMENT_LABELS[t] || t}</td><td>${n}</td></tr>`)
    .join('');
}

// ---- RESIZE ----
function resize() {
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  draw();
}
window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
