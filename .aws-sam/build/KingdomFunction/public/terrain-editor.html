<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Éditeur de Terrains</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #fff; font-family: monospace; display: flex; height: 100vh; overflow: hidden; }
    #canvas-wrap { flex: 1; overflow: hidden; position: relative; }
    canvas { display: block; cursor: crosshair; }
    #controls {
      width: 220px; background: #1a1a1a; padding: 12px; overflow-y: auto;
      border-left: 1px solid #333; font-size: 13px; display: flex; flex-direction: column; gap: 10px;
    }
    h2 { color: #c8a84b; font-size: 14px; }
    .section-title { color: #888; font-size: 11px; text-transform: uppercase; margin-bottom: 4px; }

    /* Palette de terrains */
    .terrain-btn {
      width: 100%; padding: 8px 10px; border: 2px solid #333; border-radius: 5px;
      cursor: pointer; font-family: monospace; font-size: 12px; font-weight: bold;
      display: flex; align-items: center; gap: 8px; background: #0a0a0a; color: #ccc;
      transition: border-color 0.1s;
    }
    .terrain-btn:hover { border-color: #666; }
    .terrain-btn.active { border-color: #fff; color: #fff; }
    .terrain-swatch { width: 18px; height: 18px; border-radius: 3px; flex-shrink: 0; }

    /* Terrains couleurs */
    .t-plain    { background: rgba(180,210,120,0.6); }
    .t-forest   { background: rgba(30,100,20,0.85); }
    .t-river    { background: rgba(40,120,220,0.8); }
    .t-building { background: rgba(140,100,60,0.85); }
    .t-road     { background: rgba(200,170,100,0.7); }
    .t-bridge   { background: rgba(220,140,30,0.85); }
    .t-erase    { background: #333; border: 1px dashed #666; }

    button.action {
      width: 100%; padding: 8px; background: #1a3a5a; color: #4ab0ea;
      border: 1px solid #2a6a9a; cursor: pointer; border-radius: 4px; font-family: monospace; font-size: 12px;
    }
    button.action:hover { background: #2a4a7a; }
    button.action.danger { background: #3a1a1a; color: #ea6060; border-color: #6a2a2a; }
    button.action.success { background: #1a3a1a; color: #60ea60; border-color: #2a6a2a; }

    #coords { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.75);
      padding: 4px 8px; font-family: monospace; font-size: 12px; color: #c8a84b; pointer-events: none; }

    label { color: #aaa; display: block; margin-bottom: 2px; }
    input[type=range] { width: 100%; }
    .val { color: #c8a84b; font-weight: bold; }
    #status { font-size: 11px; color: #60ea60; min-height: 16px; }

    .count-table { font-size: 11px; color: #888; }
    .count-table td:last-child { color: #c8a84b; text-align: right; padding-left: 8px; }
  </style>
</head>
<body>
<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="coords">q: — r: —</div>
</div>

<div id="controls">
  <h2>🗺 Éditeur de Terrains</h2>

  <div>
    <div class="section-title">Terrain actif</div>
    <div style="display:flex;flex-direction:column;gap:5px;">
      <button class="terrain-btn active" data-terrain="plain">
        <span class="terrain-swatch t-plain"></span> Plaine
      </button>
      <button class="terrain-btn" data-terrain="forest">
        <span class="terrain-swatch t-forest"></span> Forêt
      </button>
      <button class="terrain-btn" data-terrain="river">
        <span class="terrain-swatch t-river"></span> Rivière
      </button>
      <button class="terrain-btn" data-terrain="building">
        <span class="terrain-swatch t-building"></span> Bâtiment
      </button>
      <button class="terrain-btn" data-terrain="road">
        <span class="terrain-swatch t-road"></span> Route
      </button>
      <button class="terrain-btn" data-terrain="bridge">
        <span class="terrain-swatch t-bridge"></span> Pont
      </button>
      <button class="terrain-btn" data-terrain="plain" id="btn-erase" style="border-color:#444;">
        <span class="terrain-swatch t-erase"></span> Effacer (plaine)
      </button>
    </div>
  </div>

  <div>
    <label>Zoom: <span class="val" id="v-zoom">1.0</span></label>
    <input type="range" id="zoom-slider" min="0.02" max="0.5" value="0.1" step="0.005">
  </div>

  <div>
    <label>Opacité terrains: <span class="val" id="v-alpha">0.6</span></label>
    <input type="range" id="alpha-slider" min="0.1" max="1" value="0.6" step="0.05">
  </div>

  <div>
    <label>Opacité grille: <span class="val" id="v-grid">0.3</span></label>
    <input type="range" id="grid-slider" min="0" max="1" value="0.3" step="0.05">
  </div>

  <div>
    <button class="action success" onclick="saveData()">💾 Sauvegarder JSON</button>
    <button class="action" onclick="loadFile()" style="margin-top:4px;">📂 Charger JSON</button>
    <input type="file" id="file-input" accept=".json" style="display:none" onchange="onFileLoad(event)">
    <button class="action danger" onclick="clearAll()" style="margin-top:4px;">🗑 Tout effacer</button>
  </div>

  <div id="status"></div>

  <div>
    <div class="section-title">Statistiques</div>
    <table class="count-table" id="count-table"></table>
  </div>

  <div style="font-size:10px;color:#555;margin-top:4px;">
    <b>Navigation:</b><br>
    • Clic gauche = peindre<br>
    • Clic-glisser = peindre en continu<br>
    • Clic molette/droit = déplacer<br>
    • Molette = zoom
  </div>
</div>

<script>
// Calibration (synchronisée avec le jeu)
const MAP_HEX_SIZE = 101.5;
const MAP_ORIG_X   = 137;
const MAP_ORIG_Y   = 190;
const MAP_IMG_W    = 8800;
const MAP_IMG_H    = 7200;

const TERRAIN_COLORS = {
  plain:    'rgba(180,210,120,0.6)',
  forest:   'rgba(30,100,20,0.85)',
  river:    'rgba(40,120,220,0.8)',
  building: 'rgba(140,100,60,0.85)',
  road:     'rgba(200,170,100,0.7)',
  bridge:   'rgba(220,140,30,0.85)',
};

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('canvas-wrap');

const img = new Image();
img.src = '/img/map.webp';
img.onload = () => draw();

// State
let zoom = 0.1, panX = 0, panY = 0;
let terrainAlpha = 0.6, gridAlpha = 0.3;
let currentTerrain = 'plain';
let terrainMap = {}; // key -> terrain (only non-plain stored)
let painting = false;
let dragging = false, lastMx = 0, lastMy = 0;

// ---- HEX MATH ----
function hexToPixel(q, r) {
  const x = MAP_HEX_SIZE * (3/2 * q) + MAP_ORIG_X;
  const y = MAP_HEX_SIZE * (Math.sqrt(3)/2 * q + Math.sqrt(3) * r) + MAP_ORIG_Y;
  return { x, y };
}
function pixelToHex(px, py) {
  const x = (px - MAP_ORIG_X) / MAP_HEX_SIZE;
  const y = (py - MAP_ORIG_Y) / MAP_HEX_SIZE;
  const q = (2/3) * x;
  const r = (-1/3) * x + (Math.sqrt(3)/3) * y;
  return roundHex(q, r);
}
function roundHex(q, r) {
  const s = -q - r;
  let rq = Math.round(q), rr = Math.round(r), rs = Math.round(s);
  const dq = Math.abs(rq-q), dr = Math.abs(rr-r), ds = Math.abs(rs-s);
  if (dq > dr && dq > ds) rq = -rr-rs;
  else if (dr > ds) rr = -rq-rs;
  return { q: rq, r: rr };
}
function hexCorners(cx, cy) {
  const corners = [];
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 180 * (60 * i);
    corners.push({ x: cx + MAP_HEX_SIZE * Math.cos(angle), y: cy + MAP_HEX_SIZE * Math.sin(angle) });
  }
  return corners;
}

// ---- DRAW ----
function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  if (!img.complete || !img.naturalWidth) return;

  ctx.save();
  ctx.translate(panX, panY);
  ctx.scale(zoom, zoom);

  // Image
  ctx.drawImage(img, 0, 0);

  // Terrain fills
  ctx.save();
  ctx.globalAlpha = terrainAlpha;
  const S = Math.sqrt(3);
  const qMin = Math.floor(-MAP_ORIG_X / (MAP_HEX_SIZE * 1.5)) - 1;
  const qMax = Math.ceil((MAP_IMG_W - MAP_ORIG_X) / (MAP_HEX_SIZE * 1.5)) + 1;
  for (let q = qMin; q <= qMax; q++) {
    const rMin = Math.floor((-MAP_ORIG_Y - MAP_HEX_SIZE * S / 2 * q) / (MAP_HEX_SIZE * S)) - 1;
    const rMax = Math.ceil((MAP_IMG_H - MAP_ORIG_Y - MAP_HEX_SIZE * S / 2 * q) / (MAP_HEX_SIZE * S)) + 1;
    for (let r = rMin; r <= rMax; r++) {
      const imgX = MAP_HEX_SIZE * 1.5 * q + MAP_ORIG_X;
      const imgY = MAP_HEX_SIZE * (S / 2 * q + S * r) + MAP_ORIG_Y;
      if (imgX < 0 || imgX > MAP_IMG_W || imgY < 0 || imgY > MAP_IMG_H) continue;
      const key = `${q},${r}`;
      const terrain = terrainMap[key];
      if (!terrain || terrain === 'plain') continue;
      const color = TERRAIN_COLORS[terrain];
      if (!color) continue;
      const { x, y } = hexToPixel(q, r);
      const corners = hexCorners(x, y);
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(corners[0].x, corners[0].y);
      for (let i = 1; i < 6; i++) ctx.lineTo(corners[i].x, corners[i].y);
      ctx.closePath();
      ctx.fill();
    }
  }
  ctx.restore();

  // Grid
  if (gridAlpha > 0) {
    ctx.strokeStyle = `rgba(200,180,100,${gridAlpha})`;
    ctx.lineWidth = 1 / zoom;
    const screenToImg = (sx, sy) => ({ x: (sx - panX) / zoom, y: (sy - panY) / zoom });
    const tl = screenToImg(0, 0), br = screenToImg(W, H);
    const vqMin = Math.floor((tl.x - MAP_ORIG_X - MAP_HEX_SIZE) / (MAP_HEX_SIZE * 1.5)) - 1;
    const vqMax = Math.ceil((br.x - MAP_ORIG_X + MAP_HEX_SIZE) / (MAP_HEX_SIZE * 1.5)) + 1;
    const vrMin = Math.floor((tl.y - MAP_ORIG_Y - MAP_HEX_SIZE) / (MAP_HEX_SIZE * S)) - 2;
    const vrMax = Math.ceil((br.y - MAP_ORIG_Y + MAP_HEX_SIZE) / (MAP_HEX_SIZE * S)) + 2;
    for (let q = vqMin; q <= vqMax; q++) {
      for (let r = vrMin; r <= vrMax; r++) {
        const { x, y } = hexToPixel(q, r);
        const corners = hexCorners(x, y);
        ctx.beginPath();
        ctx.moveTo(corners[0].x, corners[0].y);
        for (let i = 1; i < 6; i++) ctx.lineTo(corners[i].x, corners[i].y);
        ctx.closePath();
        ctx.stroke();
      }
    }
  }

  ctx.restore();
}

// ---- PAINTING ----
function paintHex(mx, my) {
  const imgX = (mx - panX) / zoom;
  const imgY = (my - panY) / zoom;
  const { q, r } = pixelToHex(imgX, imgY);
  const key = `${q},${r}`;
  // Only paint hexes on the map
  const hx = MAP_HEX_SIZE * 1.5 * q + MAP_ORIG_X;
  const hy = MAP_HEX_SIZE * (Math.sqrt(3)/2 * q + Math.sqrt(3) * r) + MAP_ORIG_Y;
  if (hx < 0 || hx > MAP_IMG_W || hy < 0 || hy > MAP_IMG_H) return;
  if (currentTerrain === 'plain') {
    delete terrainMap[key];
  } else {
    terrainMap[key] = currentTerrain;
  }
  draw();
  updateCounts();
}

// ---- INPUT ----
canvas.addEventListener('mousedown', e => {
  if (e.button === 1 || e.button === 2) {
    dragging = true; lastMx = e.clientX; lastMy = e.clientY;
    return;
  }
  painting = true;
  paintHex(e.clientX, e.clientY);
});
canvas.addEventListener('mousemove', e => {
  if (dragging) {
    panX += e.clientX - lastMx;
    panY += e.clientY - lastMy;
    lastMx = e.clientX; lastMy = e.clientY;
    draw(); return;
  }
  if (painting) paintHex(e.clientX, e.clientY);
  // Coords display
  const imgX = (e.clientX - panX) / zoom;
  const imgY = (e.clientY - panY) / zoom;
  const { q, r } = pixelToHex(imgX, imgY);
  const terrain = terrainMap[`${q},${r}`] || 'plain';
  document.getElementById('coords').textContent = `q: ${q}  r: ${r}  |  ${terrain}  |  img: ${Math.round(imgX)}, ${Math.round(imgY)}`;
});
canvas.addEventListener('mouseup', () => { painting = false; dragging = false; });
canvas.addEventListener('mouseleave', () => { painting = false; dragging = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  panX = mx - (mx - panX) * factor;
  panY = my - (my - panY) * factor;
  zoom = Math.max(0.02, Math.min(2, zoom * factor));
  document.getElementById('zoom-slider').value = zoom;
  document.getElementById('v-zoom').textContent = zoom.toFixed(3);
  draw();
}, { passive: false });

// ---- CONTROLS ----
document.querySelectorAll('.terrain-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.terrain-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTerrain = btn.dataset.terrain;
    // Erase button is always plain
    if (btn.id === 'btn-erase') currentTerrain = 'plain';
  });
});

document.getElementById('zoom-slider').addEventListener('input', function() {
  zoom = parseFloat(this.value);
  document.getElementById('v-zoom').textContent = zoom.toFixed(3);
  draw();
});
document.getElementById('alpha-slider').addEventListener('input', function() {
  terrainAlpha = parseFloat(this.value);
  document.getElementById('v-alpha').textContent = terrainAlpha.toFixed(2);
  draw();
});
document.getElementById('grid-slider').addEventListener('input', function() {
  gridAlpha = parseFloat(this.value);
  document.getElementById('v-grid').textContent = gridAlpha.toFixed(2);
  draw();
});

// ---- SAVE / LOAD ----
function saveData() {
  const data = JSON.stringify(terrainMap, null, 2);
  const blob = new Blob([data], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'terrain.json';
  a.click();
  setStatus('✓ Sauvegardé !');
}

function loadFile() {
  document.getElementById('file-input').click();
}
function onFileLoad(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      terrainMap = JSON.parse(ev.target.result);
      draw(); updateCounts();
      setStatus(`✓ Chargé : ${Object.keys(terrainMap).length} cases`);
    } catch(err) {
      setStatus('✗ Erreur de lecture JSON');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function clearAll() {
  if (!confirm('Effacer tous les terrains ?')) return;
  terrainMap = {};
  draw(); updateCounts();
  setStatus('✓ Tout effacé');
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
  setTimeout(() => document.getElementById('status').textContent = '', 3000);
}

function updateCounts() {
  const counts = {};
  for (const t of Object.values(terrainMap)) {
    counts[t] = (counts[t] || 0) + 1;
  }
  const table = document.getElementById('count-table');
  const labels = { forest:'Forêt', river:'Rivière', building:'Bâtiment', road:'Route', bridge:'Pont' };
  table.innerHTML = Object.entries(counts)
    .filter(([t]) => t !== 'plain')
    .map(([t, n]) => `<tr><td>${labels[t] || t}</td><td>${n}</td></tr>`)
    .join('');
}

// ---- RESIZE ----
function resize() {
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  draw();
}
window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
