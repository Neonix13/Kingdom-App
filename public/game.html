<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kingdom Battleground — Bataille</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    #sidebar { background: #120804; display: flex; flex-direction: column; }
    .sidebar-tabs { display: flex; border-bottom: 2px solid #3a2408; flex-shrink: 0; }
    .sidebar-tab { flex: 1; padding: 7px 4px; font-size: 0.78em; font-weight: bold; text-align: center; cursor: pointer; color: #7a5820; background: #0c0502; border: none; transition: background 0.15s; }
    .sidebar-tab:hover { background: #1a0d04; color: #c8960c; }
    .sidebar-tab.active { background: #120804; color: #ffd700; border-bottom: 2px solid #ffd700; margin-bottom: -2px; }
    .sidebar-pane { display: none; flex: 1; overflow-y: auto; flex-direction: column; }
    .sidebar-pane.active { display: flex; }
    #combat-history { padding: 6px 8px; font-size: 0.75em; color: #c8a060; }
    .history-entry { border-bottom: 1px solid #2a1608; }
    .h-header { display:flex; align-items:center; gap:5px; padding:5px 4px; cursor:pointer; user-select:none; }
    .h-header:hover { background:#1a0d04; }
    .h-arrow { color:#7a5820; font-size:0.75em; width:10px; flex-shrink:0; }
    .h-title { flex:1; font-size:0.78em; color:#c8a060; }
    .h-badge { font-size:0.7em; padding:1px 5px; border-radius:3px; font-weight:bold; }
    .h-badge.h-hit { background:#6a1010; color:#ff8080; }
    .h-badge.h-miss { background:#1a3a1a; color:#80c080; }
    .h-badge.h-dead { background:#3a0a0a; color:#ff6060; }
    .h-detail { padding:4px 6px 10px; }
    .h-table { width:100%; border-collapse:collapse; font-size:0.82em; }
    .h-table td { padding:4px 7px; border:1px solid #2a1608; color:#a89060; }
    .h-table td:first-child { color:#7a5820; width:58%; }
    .h-table td:last-child { text-align:right; font-variant-numeric:tabular-nums; font-size:1.05em; }
    .h-table tr.h-section td { background:#1a0d04; color:#c8960c; font-weight:bold; font-size:0.9em; text-align:center; border-color:#3a2408; padding:5px; }
    .h-table tr.h-hit-row td { color:#ff9060; font-weight:bold; }
    .h-table tr.h-miss-row td { color:#80a060; }
    .chat-msg { font-size:0.8em; line-height:1.4; padding:3px 0; border-bottom:1px solid #1a0d04; }
    .chat-msg .chat-author { font-weight:bold; }
    .chat-msg.mine .chat-author { color:#ffd700; }
    .chat-msg.other .chat-author { color:#80c0ff; }
    .chat-msg .chat-text { color:#c8a060; }
    .chat-msg.system { color:#7a5820; font-style:italic; }
    #tab-chat.unread::after { content:'●'; color:#ff6040; font-size:0.6em; vertical-align:super; margin-left:2px; }

    /* Barre d'outils */
    #toolbar {
      position: absolute;
      top: 52px;
      left: 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: rgba(18,8,4,0.92);
      border: 1px solid #3a2408;
      border-radius: 8px;
      padding: 6px;
      z-index: 50;
    }
    .tool-btn {
      width: 36px; height: 36px;
      background: #1a0f04;
      border: 1px solid #3a2408;
      border-radius: 5px;
      color: #c8a84b;
      font-size: 15px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.1s, border-color 0.1s;
    }
    .tool-btn:hover { background: #2a1a08; border-color: #7a5820; }
    .tool-btn.active { background: #3a2408; border-color: #c8960c; color: #ffd700; }
    .tool-separator { height: 1px; background: #3a2408; margin: 2px 0; }
    .tool-popup {
      display: none;
      position: absolute;
      left: calc(100% + 8px);
      top: 0;
      background: rgba(18,8,4,0.95);
      border: 1px solid #3a2408;
      border-radius: 7px;
      padding: 8px 10px;
      white-space: nowrap;
      align-items: center;
      gap: 8px;
      z-index: 60;
    }
    .tool-popup.visible { display: flex; }
    .tool-popup label { font-size: 11px; color: #a89060; }
    .tool-popup input[type=range] { width: 120px; accent-color: #c8960c; cursor: pointer; }
    .tool-submenu {
      display: none; flex-direction: column; gap: 3px;
      padding: 4px 0 2px; border-top: 1px solid #3a2408; margin-top: 2px;
    }
    .tool-submenu.visible { display: flex; }
    .tool-submenu .tool-btn { width: 28px; height: 28px; font-size: 13px; align-self: center; }
    .grid-color-swatch {
      width: 22px; height: 22px; border-radius: 4px; cursor: pointer;
      border: 2px solid transparent; flex-shrink: 0;
    }
    .grid-color-swatch:hover { border-color: #c8960c; }
    .grid-color-swatch.active { border-color: #ffd700; }
    #unit-panel { padding: 8px; }
    /* ---- FICHE UNITÉ (style PDF) ---- */
    #unit-card-box { max-width:740px !important; width:min(740px,95vw); background:#2a2a2e; border:3px solid #111; padding:12px; }
    .uc-pdf { display:grid; grid-template-columns:260px 1fr; grid-template-rows:auto auto; gap:8px; color:#111; }
    .uc-pdf-left { display:flex; flex-direction:column; gap:8px; }
    .uc-pdf-img { width:100%; aspect-ratio:1/1; object-fit:cover; object-position:top; border:2px solid #444; background:#111; }
    .uc-pdf-img-placeholder { width:100%; aspect-ratio:1/1; background:#111; border:2px solid #444; display:flex; align-items:center; justify-content:center; font-size:64px; color:#555; }
    .uc-pdf-hpbar-wrap { background:#ddd; border:2px solid #444; height:14px; }
    .uc-pdf-hpbar { height:100%; transition:width .3s; }
    .uc-pdf-bonus { background:#fff; border:2px solid #444; padding:10px 12px; font-size:0.85em; line-height:1.6; flex:1; }
    .uc-pdf-bonus strong { color:#8b1a1a; }
    .uc-pdf-right { display:flex; flex-direction:column; gap:7px; }
    .uc-pdf-title { background:#fff; border:2px solid #444; text-align:center; padding:12px 8px; font-size:1.15em; font-weight:bold; color:#8b1a1a; line-height:1.3; font-family:'Georgia',serif; }
    .uc-pdf-stats { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
    .uc-pdf-stat { background:#fff; border:2px solid #444; text-align:center; padding:8px 6px; }
    .uc-pdf-stat-label { font-weight:bold; font-size:0.85em; color:#222; font-family:'Georgia',serif; }
    .uc-pdf-stat-value { font-size:1.35em; font-weight:bold; color:#111; margin-top:3px; }
    .uc-pdf-desc { grid-column:1/-1; background:#fff; border:2px solid #444; padding:10px 12px; font-size:0.85em; line-height:1.6; color:#111; }
    .uc-pdf-desc strong { color:#8b1a1a; }
    .uc-pdf-ability { background:#fff; border:2px solid #444; padding:10px 12px; font-size:0.85em; line-height:1.6; }
    .uc-pdf-ability strong { color:#8b1a1a; }
    /* Fallback ancien style */
    .unit-card-token-placeholder { width:64px; height:64px; border-radius:50%; background:#1a0f04; border:2px solid #3a2408; display:flex; align-items:center; justify-content:center; font-size:24px; flex-shrink:0; }
    .initiative-row {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 8px; border-radius: 4px; margin-bottom: 4px;
      background: #0f0804; border: 1px solid #2a1a08;
      font-size: 0.82em;
    }
    .initiative-row.mine { border-color: #c8960c; background: #1a0f04; }
    .initiative-row .rank { color: #7a5820; width: 18px; font-weight: bold; }
    .initiative-row .i-name { flex: 1; color: #e0c080; }
    .initiative-row .i-roll { color: #a89060; font-size: 0.9em; }
    .initiative-row .i-roll strong { color: #ffd700; }
    #turn-order-panel {
      position: fixed; top: 48px; left: 50%; transform: translateX(-50%);
      z-index: 500; display: flex; align-items: center;
      background: rgba(10,6,2,0.82); border: 1px solid #3a2408;
      border-radius: 6px; padding: 6px 10px; backdrop-filter: blur(4px);
      pointer-events: none;
    }
    #turn-order-list { display: flex; flex-direction: row; gap: 8px; align-items: flex-end; justify-content: center; }
    .turn-order-item {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      opacity: 0.55; transition: all 0.2s; cursor: default;
    }
    .turn-order-item.current { opacity: 1; }
    .turn-order-item.played { opacity: 0.25; filter: grayscale(80%); }
    .to-portrait {
      width: 46px; height: 62px; object-fit: cover; object-position: top;
      border: 2px solid #3a2408; border-radius: 3px;
      transition: all 0.2s;
    }
    .turn-order-item.current .to-portrait {
      width: 58px; height: 78px;
      border-color: #ffd700; border-width: 2px;
      box-shadow: 0 0 8px #ffd70088;
    }
    .to-portrait-placeholder {
      width: 46px; height: 62px; background: #1a0f04; border: 2px solid #3a2408;
      border-radius: 3px; display: flex; align-items: center; justify-content: center;
      font-size: 20px; color: #c8960c;
    }
    .turn-order-item.current .to-portrait-placeholder {
      width: 58px; height: 78px; border-color: #ffd700; box-shadow: 0 0 8px #ffd70088;
    }
    .to-name { font-size: 0.65em; color: #a89060; max-width: 58px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .turn-order-item.current .to-name { color: #ffd700; font-weight: bold; }
    .unit-row {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 8px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid transparent;
      margin-bottom: 4px;
      font-size: 0.82em;
    }
    .unit-row:hover { border-color: #3a2408; background: #0f0804; }
    .unit-row.selected { border-color: #c8960c; background: #1a0f04; }
    .unit-row.done { opacity: 0.5; }
    .unit-row .icon { width: 20px; text-align: center; }
    .unit-row .uname { flex: 1; }
    .unit-row .uhp { color: #a89060; font-size: 0.85em; }
    .unit-row.is-general .uname { color: #ffd700; }
    .phase-overlay-title { font-size: 1.4em; color: #c8960c; text-align: center; margin-bottom: 12px; }
    #deploy-instructions { color: #a89060; font-size: 0.85em; margin-bottom: 12px; text-align: center; }
    .mode-indicator {
      position: absolute; bottom: 12px; left: 12px;
      background: rgba(20,10,4,0.9); border: 1px solid #5a3c10;
      border-radius: 6px; padding: 8px 12px;
      font-size: 0.85em; color: #c8960c;
      z-index: 50;
    }
    .stance-btn { background:#1a0f04;border:1px solid #3a2408;color:#a89060;cursor:pointer;padding:3px 6px;font-size:0.75em;border-radius:3px;display:flex;align-items:center;gap:4px; }
    .stance-btn:hover { border-color:#7a5820;color:#e0c080; }
    .stance-btn.active { border-color:#c8960c;background:#3a2408;color:#ffd700; }
    .stance-btn img { width:16px;height:16px; }
  </style>
</head>
<body>
  <div id="turn-order-panel" style="display:none">
    <div id="turn-order-list"></div>
  </div>
  <div id="game-container">
    <div id="canvas-area">
      <div id="top-bar">
        <span class="text-gold" style="font-weight:bold">KINGDOM BATTLEGROUND</span>
        <span id="top-turn" class="text-muted">Tour 1</span>
        <span id="top-current-player" style="color:#c8960c"></span>
        <span style="flex:1"></span>
        <span id="top-phase" class="text-muted"></span>
      </div>
      <canvas id="game-canvas"></canvas>

      <!-- Barre d'outils haut-gauche -->
      <div id="toolbar">
        <button class="tool-btn active" id="tool-cursor" title="Sélection" onclick="setToolbarTool('cursor')">&#9654;</button>
        <div class="tool-separator"></div>
        <button class="tool-btn" id="tool-terrain" title="Afficher les terrains" onclick="toggleTerrain()">&#127795;</button>
        <div class="tool-separator"></div>
        <!-- Groupe Grille -->
        <button class="tool-btn" id="tool-grid-group" title="Grille" onclick="toggleGridSubmenu()">&#35;</button>
        <div class="tool-submenu" id="grid-submenu">
          <div style="position:relative;display:flex;justify-content:center">
            <button class="tool-btn" title="Opacité" onclick="toggleToolPopup('grid-popup')">&#9681;</button>
            <div class="tool-popup" id="grid-popup">
              <label>Opacité</label>
              <input type="range" min="0" max="1" step="0.05" value="0.25" oninput="setGridOpacity(this.value)">
            </div>
          </div>
          <div style="position:relative;display:flex;justify-content:center">
            <button class="tool-btn" title="Épaisseur" onclick="toggleToolPopup('grid-thick-popup')">&#8801;</button>
            <div class="tool-popup" id="grid-thick-popup">
              <label>Épaisseur</label>
              <input type="range" min="0.3" max="4" step="0.1" value="1" oninput="setGridThickness(this.value)">
            </div>
          </div>
          <div style="position:relative;display:flex;justify-content:center">
            <button class="tool-btn" title="Couleur" onclick="toggleToolPopup('grid-color-popup')">&#11044;</button>
            <div class="tool-popup" id="grid-color-popup" style="flex-wrap:wrap;max-width:180px;white-space:normal;gap:5px;">
              <label style="width:100%;margin-bottom:2px">Couleur</label>
              <div class="grid-color-swatch active" data-rgb="180,140,60" title="Or"     style="background:rgba(180,140,60,0.9)" onclick="setGridColor('180,140,60')"></div>
              <div class="grid-color-swatch"        data-rgb="220,220,220" title="Blanc"   style="background:rgba(220,220,220,0.9)" onclick="setGridColor('220,220,220')"></div>
              <div class="grid-color-swatch"        data-rgb="60,180,220" title="Cyan"    style="background:rgba(60,180,220,0.9)"  onclick="setGridColor('60,180,220')"></div>
              <div class="grid-color-swatch"        data-rgb="220,80,40" title="Rouge"   style="background:rgba(220,80,40,0.9)"   onclick="setGridColor('220,80,40')"></div>
              <div class="grid-color-swatch"        data-rgb="80,220,80" title="Vert"    style="background:rgba(80,220,80,0.9)"   onclick="setGridColor('80,220,80')"></div>
              <div class="grid-color-swatch"        data-rgb="160,100,220" title="Violet"  style="background:rgba(160,100,220,0.9)" onclick="setGridColor('160,100,220')"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="mode-indicator" id="mode-indicator">Mode : Sélection</div>
    </div>

    <div id="sidebar">
      <div id="sidebar-header">
        <h3 id="sidebar-title">Chargement…</h3>
        <div id="turn-info"></div>
      </div>

      <div class="sidebar-tabs">
        <button class="sidebar-tab active" onclick="switchSidebarTab('units')">⚔ Unités</button>
        <button class="sidebar-tab" onclick="switchSidebarTab('history')">📜 Historique</button>
        <button class="sidebar-tab" id="tab-chat" onclick="switchSidebarTab('chat')">💬 Chat</button>
      </div>
      <div id="global-action-bar" style="padding:4px 8px;border-bottom:1px solid #3a2408;display:flex;gap:4px">
        <button class="btn btn-success" id="btn-end-turn-global" onclick="endTurn()" style="display:none;flex:1">Fin du tour</button>
        <button class="btn btn-success" id="btn-deploy-ready-global" onclick="deploymentReady()" style="display:none;flex:1">Prêt !</button>
      </div>

      <div class="sidebar-pane active" id="pane-units">
        <div id="unit-panel">
          <div id="unit-list"></div>
        </div>

        <div id="stance-panel" style="display:none;padding:6px 8px;border-top:1px solid #3a2408">
          <div style="font-size:0.75em;color:#7a5820;margin-bottom:4px">POSTURE (coût: 2 vitesse)</div>
          <div id="stance-list" style="display:flex;flex-wrap:wrap;gap:4px"></div>
        </div>

        <div id="selected-unit-detail" style="display:none">
          <h4 id="detail-name"></h4>
          <div id="detail-stats"></div>
        </div>

        <div id="action-panel">
          <h4>Actions</h4>
          <div class="action-btns">
            <button class="btn btn-primary" id="btn-move" style="display:none"></button>
            <button class="btn btn-danger" id="btn-attack" onclick="setMode('attack')" style="display:none">Attaquer</button>
            <button class="btn btn-primary" id="btn-ability" onclick="useAbility()" style="display:none">Capacité active</button>
            <button class="btn btn-warning" id="btn-motivate" onclick="setMode('motivate')" style="display:none">Motiver</button>
            <button class="btn btn-success" id="btn-end-turn" onclick="endTurn()" style="display:none">Fin du tour</button>
            <button class="btn btn-success" id="btn-deploy-ready" onclick="deploymentReady()" style="display:none">Prêt !</button>
          </div>
        </div>

        <div id="combat-log"></div>
      </div>

      <div class="sidebar-pane" id="pane-history" style="overflow-y:auto">
        <div id="combat-history"><div style="color:#5a3c10;font-style:italic;padding:12px">Aucun combat pour l'instant.</div></div>
      </div>

      <div class="sidebar-pane" id="pane-chat" style="flex-direction:column">
        <div id="chat-messages" style="flex:1;overflow-y:auto;padding:6px 8px;display:flex;flex-direction:column;gap:4px;min-height:0"></div>
        <div id="chat-input-area" style="display:flex;gap:4px;padding:6px 8px;border-top:1px solid #3a2408;flex-shrink:0">
          <input id="chat-input" type="text" placeholder="Message…" maxlength="200"
            style="flex:1;background:#0c0502;border:1px solid #3a2408;color:#e0c080;border-radius:4px;padding:5px 8px;font-size:0.82em;"
            onkeydown="if(event.key==='Enter')sendChat()">
          <button class="btn btn-primary" onclick="sendChat()" style="padding:4px 10px;font-size:0.8em">Envoyer</button>
        </div>
      </div>
    </div>
  </div>

  <div id="combat-result-box" style="display:none;position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#1a0f04ee;border:1px solid #c8960c;color:#e0c080;padding:12px 18px;border-radius:6px;font-size:0.9em;z-index:500;max-width:400px;line-height:1.6"></div>

  <div id="notification"></div>
  <div id="app-version" style="position:fixed;bottom:8px;right:12px;font-size:0.72em;color:#5a3c10;opacity:0.7;pointer-events:none;z-index:200"></div>

  <!-- Defense choice overlay -->
  <div class="overlay" id="overlay-defense" style="display:none">
    <div class="overlay-box" style="min-width:340px;text-align:center">
      <h3 style="color:#c8960c;margin:0 0 10px">&#9876; Vous êtes attaqué !</h3>
      <p><b id="defense-attacker-name"></b> attaque <b id="defense-target-name"></b></p>
      <p style="color:#a89060;font-size:0.9em">Choisissez votre réponse (<span id="defense-countdown">8</span>s)</p>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:12px">
        <button class="btn" onclick="sendDefenseChoice('rien')" style="background:#3a2408;border:1px solid #7a5820;color:#e0c080;padding:8px 14px">Rien</button>
        <button class="btn" onclick="sendDefenseChoice('counter')" style="background:#1a3a08;border:1px solid #4a8020;color:#a0e080;padding:8px 14px">&#9876; Contre-attaquer</button>
        <button class="btn" onclick="sendDefenseChoice('absorb')" style="background:#08203a;border:1px solid #205080;color:#80c0e0;padding:8px 14px">&#128737; Encaisser</button>
      </div>
    </div>
  </div>

  <!-- Stance confirmation overlay -->
  <div class="overlay" id="overlay-stance" style="display:none">
    <div class="overlay-box" style="min-width:320px;text-align:center">
      <h3 style="color:#c8960c;margin:0 0 10px">&#9876; Changer de posture</h3>
      <p><b id="stance-unit-name"></b></p>
      <p style="color:#a89060;font-size:0.9em"><span id="stance-from"></span> → <b id="stance-to"></b></p>
      <div style="display:flex;gap:10px;justify-content:center;margin-top:14px">
        <button class="btn" onclick="cancelStanceChange()" style="background:#3a2408;border:1px solid #7a5820;color:#e0c080;padding:8px 18px">Annuler</button>
        <button class="btn" onclick="confirmStanceChange()" style="background:#1a3a08;border:1px solid #4a8020;color:#a0e080;padding:8px 18px">&#10003; Confirmer</button>
      </div>
    </div>
  </div>

  <!-- Initiative overlay -->
  <div class="overlay" id="overlay-initiative" style="display:none">
    <div class="overlay-box" style="min-width:320px">
      <div id="initiative-content"></div>
      <button class="btn btn-primary" style="width:100%;margin-top:14px" onclick="closeInitiativeModal()">Commencer !</button>
    </div>
  </div>

  <!-- Fiche unité -->
  <div class="overlay" id="overlay-unit-card" style="display:none" onclick="if(event.target===this)closeUnitCard()">
    <div class="overlay-box" id="unit-card-box" style="position:relative">
      <button onclick="closeUnitCard()" style="position:absolute;top:8px;right:10px;background:none;border:none;color:#7a5820;font-size:18px;cursor:pointer">✕</button>
      <div id="unit-card-content"></div>
    </div>
  </div>

  <!-- Game Over overlay -->
  <div class="overlay" id="overlay-gameover" style="display:none">
    <div class="overlay-box" style="text-align:center">
      <h2>Fin de Bataille</h2>
      <div id="gameover-msg" style="font-size:1.3em;margin:20px 0;color:#c8960c"></div>
      <button class="btn btn-primary" onclick="window.location.href='/'">Retour au menu</button>
    </div>
  </div>

  <script>
    if (location.hostname === 'localhost' || location.hostname === '127.0.0.1') {
      window.WS_URL = 'ws://localhost:3000';
    } else {
      window.WS_URL = 'wss://czp9kaymr6.execute-api.eu-west-3.amazonaws.com/prod';
    }
  </script>
  <script src="/js/version.js"></script>
  <script src="/js/hexGrid.js"></script>
