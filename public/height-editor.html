<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Éditeur de Hauteurs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; color: #fff; font-family: monospace; display: flex; height: 100vh; overflow: hidden; }
    #canvas-wrap { flex: 1; overflow: hidden; position: relative; }
    canvas { display: block; cursor: crosshair; }
    #controls {
      width: 220px; background: #1a1a1a; padding: 12px; overflow-y: auto;
      border-left: 1px solid #333; font-size: 13px; display: flex; flex-direction: column; gap: 10px;
    }
    h2 { color: #c8a84b; font-size: 14px; }
    .section-title { color: #888; font-size: 11px; text-transform: uppercase; margin-bottom: 4px; }

    .height-btn {
      width: 100%; padding: 8px 10px; border: 2px solid #333; border-radius: 5px;
      cursor: pointer; font-family: monospace; font-size: 12px; font-weight: bold;
      display: flex; align-items: center; gap: 8px; background: #0a0a0a; color: #ccc;
      transition: border-color 0.1s;
    }
    .height-btn:hover { border-color: #666; }
    .height-btn.active { border-color: #fff; color: #fff; }
    .height-swatch { width: 18px; height: 18px; border-radius: 3px; flex-shrink: 0; }

    button.action {
      width: 100%; padding: 8px; background: #1a3a5a; color: #4ab0ea;
      border: 1px solid #2a6a9a; cursor: pointer; border-radius: 4px; font-family: monospace; font-size: 12px;
    }
    button.action:hover { background: #2a4a7a; }
    button.action.danger { background: #3a1a1a; color: #ea6060; border-color: #6a2a2a; }
    button.action.success { background: #1a3a1a; color: #60ea60; border-color: #2a6a2a; }

    #coords { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,0.75);
      padding: 4px 8px; font-family: monospace; font-size: 12px; color: #c8a84b; pointer-events: none; }

    label { color: #aaa; display: block; margin-bottom: 2px; }
    input[type=range] { width: 100%; }
    .val { color: #c8a84b; font-weight: bold; }
    #status { font-size: 11px; color: #60ea60; min-height: 16px; }

    .count-table { font-size: 11px; color: #888; }
    .count-table td:last-child { color: #c8a84b; text-align: right; padding-left: 8px; }

    #legend {
      display: flex; flex-direction: column; gap: 2px; font-size: 10px; color: #777;
    }
    .legend-row { display: flex; align-items: center; gap: 6px; }
    .legend-swatch { width: 14px; height: 14px; border-radius: 2px; flex-shrink: 0; }
  </style>
</head>
<body>
<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="coords">q: — r: —</div>
</div>

<div id="controls">
  <h2>⛰ Éditeur de Hauteurs</h2>

  <div>
    <div class="section-title">Hauteur active</div>
    <div style="display:flex;flex-direction:column;gap:5px;" id="height-buttons"></div>
  </div>

  <div>
    <label>Pinceau (rayon): <span class="val" id="v-brush">0</span></label>
    <input type="range" id="brush-slider" min="0" max="5" value="0" step="1">
  </div>

  <div>
    <label>Zoom: <span class="val" id="v-zoom">0.100</span></label>
    <input type="range" id="zoom-slider" min="0.02" max="0.5" value="0.1" step="0.005">
  </div>

  <div>
    <label>Opacité hauteurs: <span class="val" id="v-alpha">0.6</span></label>
    <input type="range" id="alpha-slider" min="0.1" max="1" value="0.6" step="0.05">
  </div>

  <div>
    <label>Opacité grille: <span class="val" id="v-grid">0.3</span></label>
    <input type="range" id="grid-slider" min="0" max="1" value="0.3" step="0.05">
  </div>

  <div>
    <label><input type="checkbox" id="show-labels" checked style="margin-right:4px;">Afficher les numéros</label>
  </div>

  <div>
    <button class="action success" onclick="saveData()">💾 Sauvegarder JSON</button>
    <button class="action" onclick="loadFile()" style="margin-top:4px;">📂 Charger JSON</button>
    <input type="file" id="file-input" accept=".json" style="display:none" onchange="onFileLoad(event)">
    <button class="action danger" onclick="clearAll()" style="margin-top:4px;">🗑 Tout effacer</button>
  </div>

  <div id="status"></div>

  <div>
    <div class="section-title">Légende</div>
    <div id="legend"></div>
  </div>

  <div style="font-size:10px;color:#555;margin-top:4px;">
    <b>Navigation:</b><br>
    • Clic gauche = peindre<br>
    • Clic-glisser = peindre en continu<br>
    • Clic molette/droit = déplacer<br>
    • Molette = zoom
  </div>
</div>

<script>
const MAP_HEX_SIZE = 101.5;
const MAP_ORIG_X   = 137;
const MAP_ORIG_Y   = 190;
const MAP_IMG_W    = 8800;
const MAP_IMG_H    = 7200;

const HEIGHTS = [
  { value: 0, label: 'Niveau 0 — Bas',       color: 'rgba(30,80,180,0.7)' },
  { value: 1, label: 'Niveau 1 — Plaine',    color: 'rgba(80,160,60,0.7)' },
  { value: 2, label: 'Niveau 2 — Colline',   color: 'rgba(180,190,60,0.7)' },
  { value: 3, label: 'Niveau 3 — Hauteur',   color: 'rgba(200,120,30,0.7)' },
  { value: 4, label: 'Niveau 4 — Montagne',  color: 'rgba(180,60,30,0.7)' },
  { value: 5, label: 'Niveau 5 — Pic',       color: 'rgba(220,220,220,0.8)' },
];
const ERASE_VALUE = null;

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('canvas-wrap');

const img = new Image();
img.src = '/assets/img/map.webp';
img.onload = () => draw();

let zoom = 0.1, panX = 0, panY = 0;
let heightAlpha = 0.6, gridAlpha = 0.3;
let currentHeight = 1;
let erasing = false;
let brushRadius = 0;
let showLabels = true;
let heightMap = {};
let painting = false;
let dragging = false, lastMx = 0, lastMy = 0;

// Build height buttons
const btnContainer = document.getElementById('height-buttons');
HEIGHTS.forEach(h => {
  const btn = document.createElement('button');
  btn.className = 'height-btn' + (h.value === 1 ? ' active' : '');
  btn.dataset.value = h.value;
  btn.innerHTML = `<span class="height-swatch" style="background:${h.color}"></span> ${h.label}`;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.height-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentHeight = h.value;
    erasing = false;
  });
  btnContainer.appendChild(btn);
});
const eraseBtn = document.createElement('button');
eraseBtn.className = 'height-btn';
eraseBtn.innerHTML = `<span class="height-swatch" style="background:#333;border:1px dashed #666"></span> Effacer`;
eraseBtn.addEventListener('click', () => {
  document.querySelectorAll('.height-btn').forEach(b => b.classList.remove('active'));
  eraseBtn.classList.add('active');
  erasing = true;
});
btnContainer.appendChild(eraseBtn);

// Build legend
const legend = document.getElementById('legend');
HEIGHTS.forEach(h => {
  const row = document.createElement('div');
  row.className = 'legend-row';
  row.innerHTML = `<span class="legend-swatch" style="background:${h.color}"></span><span>${h.label}</span>`;
  legend.appendChild(row);
});

// ---- HEX MATH ----
function hexToPixel(q, r) {
  return {
    x: MAP_HEX_SIZE * (3/2 * q) + MAP_ORIG_X,
    y: MAP_HEX_SIZE * (Math.sqrt(3)/2 * q + Math.sqrt(3) * r) + MAP_ORIG_Y,
  };
}
function pixelToHex(px, py) {
  const x = (px - MAP_ORIG_X) / MAP_HEX_SIZE;
  const y = (py - MAP_ORIG_Y) / MAP_HEX_SIZE;
  const q = (2/3) * x;
  const r = (-1/3) * x + (Math.sqrt(3)/3) * y;
  return roundHex(q, r);
}
function roundHex(q, r) {
  const s = -q - r;
  let rq = Math.round(q), rr = Math.round(r), rs = Math.round(s);
  const dq = Math.abs(rq-q), dr = Math.abs(rr-r), ds = Math.abs(rs-s);
  if (dq > dr && dq > ds) rq = -rr-rs;
  else if (dr > ds) rr = -rq-rs;
  return { q: rq, r: rr };
}
function hexDistance(q1, r1, q2, r2) {
  return (Math.abs(q1-q2) + Math.abs(q1+r1-q2-r2) + Math.abs(r1-r2)) / 2;
}
function hexCorners(cx, cy) {
  const corners = [];
  for (let i = 0; i < 6; i++) {
    const angle = Math.PI / 180 * (60 * i);
    corners.push({ x: cx + MAP_HEX_SIZE * Math.cos(angle), y: cy + MAP_HEX_SIZE * Math.sin(angle) });
  }
  return corners;
}
function hexInBrush(cq, cr, q, r) {
  return hexDistance(cq, cr, q, r) <= brushRadius;
}

// ---- DRAW ----
function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);
  if (!img.complete || !img.naturalWidth) return;

  ctx.save();
  ctx.translate(panX, panY);
  ctx.scale(zoom, zoom);

  ctx.drawImage(img, 0, 0);

  const S = Math.sqrt(3);
  const screenToImg = (sx, sy) => ({ x: (sx - panX) / zoom, y: (sy - panY) / zoom });
  const tl = screenToImg(0, 0), br = screenToImg(W, H);
  const vqMin = Math.floor((tl.x - MAP_ORIG_X - MAP_HEX_SIZE) / (MAP_HEX_SIZE * 1.5)) - 1;
  const vqMax = Math.ceil((br.x - MAP_ORIG_X + MAP_HEX_SIZE) / (MAP_HEX_SIZE * 1.5)) + 1;
  const vrMin = Math.floor((tl.y - MAP_ORIG_Y - MAP_HEX_SIZE) / (MAP_HEX_SIZE * S)) - 2;
  const vrMax = Math.ceil((br.y - MAP_ORIG_Y + MAP_HEX_SIZE) / (MAP_HEX_SIZE * S)) + 2;

  // Height fills
  ctx.save();
  ctx.globalAlpha = heightAlpha;
  for (let q = vqMin; q <= vqMax; q++) {
    for (let r = vrMin; r <= vrMax; r++) {
      const imgX = MAP_HEX_SIZE * 1.5 * q + MAP_ORIG_X;
      const imgY = MAP_HEX_SIZE * (S / 2 * q + S * r) + MAP_ORIG_Y;
      if (imgX < 0 || imgX > MAP_IMG_W || imgY < 0 || imgY > MAP_IMG_H) continue;
      const key = `${q},${r}`;
      const h = heightMap[key];
      if (h === undefined) continue;
      const def = HEIGHTS[h];
      if (!def) continue;
      const { x, y } = hexToPixel(q, r);
      const corners = hexCorners(x, y);
      ctx.fillStyle = def.color;
      ctx.beginPath();
      ctx.moveTo(corners[0].x, corners[0].y);
      for (let i = 1; i < 6; i++) ctx.lineTo(corners[i].x, corners[i].y);
      ctx.closePath();
      ctx.fill();
    }
  }
  ctx.restore();

  // Height labels
  if (showLabels) {
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const fontSize = Math.max(8, MAP_HEX_SIZE * 0.3);
    ctx.font = `bold ${fontSize}px monospace`;
    for (let q = vqMin; q <= vqMax; q++) {
      for (let r = vrMin; r <= vrMax; r++) {
        const imgX = MAP_HEX_SIZE * 1.5 * q + MAP_ORIG_X;
        const imgY = MAP_HEX_SIZE * (S / 2 * q + S * r) + MAP_ORIG_Y;
        if (imgX < 0 || imgX > MAP_IMG_W || imgY < 0 || imgY > MAP_IMG_H) continue;
        const key = `${q},${r}`;
        const h = heightMap[key];
        if (h === undefined) continue;
        const { x, y } = hexToPixel(q, r);
        ctx.fillStyle = h >= 5 ? '#333' : '#fff';
        ctx.strokeStyle = 'rgba(0,0,0,0.6)';
        ctx.lineWidth = fontSize * 0.15;
        ctx.strokeText(h, x, y);
        ctx.fillText(h, x, y);
      }
    }
    ctx.restore();
  }

  // Grid
  if (gridAlpha > 0) {
    ctx.strokeStyle = `rgba(200,180,100,${gridAlpha})`;
    ctx.lineWidth = 1 / zoom;
    for (let q = vqMin; q <= vqMax; q++) {
      for (let r = vrMin; r <= vrMax; r++) {
        const { x, y } = hexToPixel(q, r);
        const corners = hexCorners(x, y);
        ctx.beginPath();
        ctx.moveTo(corners[0].x, corners[0].y);
        for (let i = 1; i < 6; i++) ctx.lineTo(corners[i].x, corners[i].y);
        ctx.closePath();
        ctx.stroke();
      }
    }
  }

  ctx.restore();
}

// ---- PAINTING ----
function getHexesInBrush(cq, cr) {
  const result = [];
  for (let dq = -brushRadius; dq <= brushRadius; dq++) {
    for (let dr = -brushRadius; dr <= brushRadius; dr++) {
      if (hexDistance(0, 0, dq, dr) <= brushRadius) result.push({ q: cq + dq, r: cr + dr });
    }
  }
  return result;
}

function paintHex(mx, my) {
  const imgX = (mx - panX) / zoom;
  const imgY = (my - panY) / zoom;
  const { q, r } = pixelToHex(imgX, imgY);
  const hexes = getHexesInBrush(q, r);
  for (const { q: hq, r: hr } of hexes) {
    const hx = MAP_HEX_SIZE * 1.5 * hq + MAP_ORIG_X;
    const hy = MAP_HEX_SIZE * (Math.sqrt(3)/2 * hq + Math.sqrt(3) * hr) + MAP_ORIG_Y;
    if (hx < 0 || hx > MAP_IMG_W || hy < 0 || hy > MAP_IMG_H) continue;
    const key = `${hq},${hr}`;
    if (erasing) delete heightMap[key];
    else heightMap[key] = currentHeight;
  }
  draw();
}

// ---- INPUT ----
canvas.addEventListener('mousedown', e => {
  if (e.button === 1 || e.button === 2) {
    dragging = true; lastMx = e.clientX; lastMy = e.clientY; return;
  }
  painting = true;
  paintHex(e.clientX, e.clientY);
});
canvas.addEventListener('mousemove', e => {
  if (dragging) {
    panX += e.clientX - lastMx;
    panY += e.clientY - lastMy;
    lastMx = e.clientX; lastMy = e.clientY;
    draw(); return;
  }
  if (painting) paintHex(e.clientX, e.clientY);
  const imgX = (e.clientX - panX) / zoom;
  const imgY = (e.clientY - panY) / zoom;
  const { q, r } = pixelToHex(imgX, imgY);
  const h = heightMap[`${q},${r}`];
  document.getElementById('coords').textContent =
    `q: ${q}  r: ${r}  |  hauteur: ${h !== undefined ? h : '—'}`;
});
canvas.addEventListener('mouseup', () => { painting = false; dragging = false; });
canvas.addEventListener('mouseleave', () => { painting = false; dragging = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  panX = mx - (mx - panX) * factor;
  panY = my - (my - panY) * factor;
  zoom = Math.max(0.02, Math.min(2, zoom * factor));
  document.getElementById('zoom-slider').value = zoom;
  document.getElementById('v-zoom').textContent = zoom.toFixed(3);
  draw();
}, { passive: false });

// ---- CONTROLS ----
document.getElementById('zoom-slider').addEventListener('input', function() {
  zoom = parseFloat(this.value);
  document.getElementById('v-zoom').textContent = zoom.toFixed(3);
  draw();
});
document.getElementById('alpha-slider').addEventListener('input', function() {
  heightAlpha = parseFloat(this.value);
  document.getElementById('v-alpha').textContent = heightAlpha.toFixed(2);
  draw();
});
document.getElementById('grid-slider').addEventListener('input', function() {
  gridAlpha = parseFloat(this.value);
  document.getElementById('v-grid').textContent = gridAlpha.toFixed(2);
  draw();
});
document.getElementById('brush-slider').addEventListener('input', function() {
  brushRadius = parseInt(this.value);
  document.getElementById('v-brush').textContent = brushRadius;
});
document.getElementById('show-labels').addEventListener('change', function() {
  showLabels = this.checked;
  draw();
});

// ---- SAVE / LOAD ----
function saveData() {
  const blob = new Blob([JSON.stringify(heightMap, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'height.json';
  a.click();
  setStatus('✓ Sauvegardé !');
}
function loadFile() { document.getElementById('file-input').click(); }
function onFileLoad(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      heightMap = JSON.parse(ev.target.result);
      draw();
      setStatus(`✓ Chargé : ${Object.keys(heightMap).length} cases`);
    } catch { setStatus('✗ Erreur de lecture JSON'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}
function clearAll() {
  if (!confirm('Effacer toutes les hauteurs ?')) return;
  heightMap = {};
  draw();
  setStatus('✓ Tout effacé');
}
function setStatus(msg) {
  document.getElementById('status').textContent = msg;
  setTimeout(() => document.getElementById('status').textContent = '', 3000);
}

// ---- RESIZE ----
function resize() { canvas.width = wrap.clientWidth; canvas.height = wrap.clientHeight; draw(); }
window.addEventListener('resize', resize);
resize();
</script>
</body>
</html>
